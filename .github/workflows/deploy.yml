name: CI / Deploy

on:
  push:
    branches:
      - Dev       # Deploy automático al VPS en cada push a Dev
      - main      # Deploy a producción (si se añade otro entorno)
  pull_request:
    branches:
      - Dev
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  LINT / TEST (en cada PR y push)
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kria_test
          POSTGRES_USER: kria
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kria"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://kria:test_password@localhost:5432/kria_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: kria-test
      MINIO_USE_HTTPS: "false"
      MINIO_EXTERNAL_ENDPOINT: http://localhost:9000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 shared-mime-info fonts-liberation

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Django checks
        working-directory: backend
        run: python manage.py check --deploy 2>&1 | grep -v "WARNINGS" || true

      - name: Run migrations (smoke test)
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────
  #  BUILD — verifica que las imágenes Docker compilan correctamente
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Docker Build Check
    runs-on: ubuntu-22.04
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend --file backend/Dockerfile --tag kria-backend:ci

      - name: Build frontend image
        run: docker build ./frontend --file frontend/Dockerfile --target production --tag kria-frontend:ci

  # ─────────────────────────────────────────────────────────────────
  #  DEPLOY — SSH al VPS y ejecuta scripts/deploy.sh
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-22.04
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/Dev'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host:       ${{ secrets.VPS_HOST }}
          username:   ${{ secrets.VPS_USER }}
          key:        ${{ secrets.VPS_SSH_KEY }}
          port:       ${{ secrets.VPS_PORT || 22 }}
          timeout:    10m
          script: |
            export DEPLOY_BRANCH=Dev
            cd /opt/kria
            bash scripts/deploy.sh 2>&1 | tee /tmp/kria-deploy.log
            echo "Exit code: $?"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed. Check the VPS logs at /tmp/kria-deploy.log"
