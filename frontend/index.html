<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#051937" />
    <meta name="description" content="KRIA — Plataforma de Gestión de Libros Genealógicos Avícolas" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>KRIA</title>
  </head>
  <body>
    <!--
      Apply tenant branding CSS properties from localStorage before React renders.
      This prevents a 1-frame flash of default colors/modules on hard refresh (F5).
    -->
    <script>
      try {
        var raw = localStorage.getItem("kria-tenant");
        if (raw) {
          var branding = JSON.parse(raw)?.state?.branding;
          if (branding) {
            var r = document.documentElement.style;
            if (branding.primary_color)   r.setProperty("--color-primary",   branding.primary_color);
            if (branding.secondary_color) r.setProperty("--color-secondary", branding.secondary_color);
            if (branding.name)            document.title = branding.name + " \u2014 KRIA";
          }
        }
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
