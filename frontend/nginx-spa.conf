# Upstream para el backend Django (resuelto via Docker DNS interno)
upstream backend_api {
    server backend:8000;
}

# ── Catch-all: rechaza cualquier dominio no reconocido ──────────
# Esto impide que AGAMUR responda a dominios de otras apps
# desplegadas en el mismo servidor (p.ej. kronos.klyp.es).
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# NGINX_HOSTS se sustituye en tiempo de arranque del contenedor
# mediante envsubst (ver Dockerfile, target production).
# Valor por defecto: "localhost" (para builds locales/CI).
# En producción (Coolify): pasar la variable NGINX_HOSTS=agamur.klyp.es admin-agamur.klyp.es
server {
    listen 80;
    server_name ${NGINX_HOSTS};
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Django API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
    }

    # ── Django Admin ───────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # ── Django static files (collectstatic) ────────────────────────
    location /static/ {
        alias   /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check ───────────────────────────────────────────────
    location /health/ {
        proxy_pass http://backend_api;
        access_log off;
    }

    # ── React SPA assets (cache agresivo) ─────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback (SIEMPRE al final) ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
