# ═══════════════════════════════════════════════════════════════════
#  AGAMUR — Nginx interno para Coolify
#  SSL gestionado externamente por Traefik de Coolify.
#  Este nginx sólo hace el routing interno HTTP entre servicios.
# ═══════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml font/woff2;

    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:80;   keepalive 16; }

    server {
        listen 80;
        server_name _;

        # ── API ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 300s;
        }

        # ── Django Admin ─────────────────────────────────────────
        location /admin/ {
            proxy_pass       http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # ── Django Static files ──────────────────────────────────
        location /static/ {
            alias   /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Health check ─────────────────────────────────────────
        location /health/ {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Frontend SPA (todo lo demás) ─────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_intercept_errors off;
        }
    }
}
