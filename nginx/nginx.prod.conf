worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    client_max_body_size 50M;

    # Gzip
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml font/woff2;

    # Rate limiting
    limit_req_zone  $binary_remote_addr  zone=auth:10m    rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=api:10m     rate=120r/m;
    limit_conn_zone $binary_remote_addr  zone=conn:10m;

    # Upstream services
    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:80;   keepalive 16; }

    # ── HTTP: redirect all to HTTPS + handle ACME challenges ─────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS catch-all: rechaza SNI no reconocido ───────────────────
    # Sin este bloque, nginx usa el primer servidor HTTPS como fallback
    # para cualquier dominio desconocido que llegue al puerto 443.
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        return 444;
    }

    # ── HTTPS main server ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ~^(?<slug>.+)\.agamur\.es$ agamur.es;

        # SSL
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                                          always;
        add_header X-Content-Type-Options     "nosniff"                                       always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
        add_header Content-Security-Policy    "default-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: wss:;" always;

        # Connection limit
        limit_conn conn 50;

        # ── Auth endpoints (rate limited) ──────────────────────────────
        location ~ ^/api/v1/auth/(login|password-reset) {
            limit_req  zone=auth  burst=5  nodelay;
            proxy_pass http://backend;
            include    /etc/nginx/snippets/proxy_headers.conf;
        }

        # ── API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://backend;
            include    /etc/nginx/snippets/proxy_headers.conf;
            proxy_read_timeout 300s;
        }

        # ── Django admin ───────────────────────────────────────────────
        location /admin/ {
            proxy_pass http://backend;
            include    /etc/nginx/snippets/proxy_headers.conf;
            # Only allow internal / trusted IPs in production
            # allow  YOUR_OFFICE_IP;
            # deny   all;
        }

        # ── Django static files ────────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires    1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Health check ───────────────────────────────────────────────
        location /health/ {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Frontend SPA ───────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            include    /etc/nginx/snippets/proxy_headers.conf;
            proxy_intercept_errors off;
        }
    }
}
